# docs/coverage-ledger.waivers.yaml — Hand-edited waiver overrides for
# the §11.4.25 Full-Automation-Coverage ledger.
#
# Per HelixConstitution §11.4.25 (Full-Automation-Coverage Mandate, 2026-05-15):
# every feature × invariant cell appears in the ledger. The generator infers
# invariants 1, 2, 6 mechanically from on-disk state; invariants 3, 4, 5
# require operator-or-reviewer judgement and default to `gap` until a waiver
# entry overrides them with positive-evidence rationale.
#
# WAIVER DISCIPLINE (anti-bluff per §6.J/§6.L):
#
# 1. A waiver is NOT a free pass. Every waiver entry MUST cite specific
#    evidence that justifies the override — a closure log, a commit SHA,
#    a §6.AE-exempt ledger entry, an external user-manual reference, etc.
#
# 2. Per §11.4.25 the gap-tracker is mandatory: gaps in the ledger MUST cite
#    a tracked work item per §11.4.15 + §11.4.16. The Lava equivalent is
#    the closure-log convention in `.lava-ci-evidence/sixth-law-incidents/`
#    + `.lava-ci-evidence/crashlytics-resolved/` + `docs/issues/fixed/BUGFIXES.md`
#    (per §6.AD.3 equivalence). Waivers SHOULD reference one of these when
#    the override is `pass`.
#
# 3. Two kinds of override values are permitted:
#    - `"pass: <evidence-citation>"` — operator-or-reviewer affirms the
#      invariant is satisfied based on positive evidence beyond what the
#      generator can infer mechanically.
#    - `"waiver: <reason>"` — neither pass nor gap; explicit waiver with
#      tracked-work-item citation explaining why this row is exempt.
#
# 4. The pre-push gate (when enabled per Phase 7-debt) checks that every
#    `"pass: ..."` waiver cites at least ONE of: closure-log path, commit
#    SHA, docs/ path, .lava-ci-evidence/ path.
#
# 5. PHASE 7 WAIVER BACKFILL (2026-05-16): this file's contents were
#    audited row-by-row per the Phase 7 brief. Justifications for the
#    cross-cutting upgrades (documented_promise, no_open_bugs, four_layer)
#    are recorded at the section headers below; per-row entries cite the
#    section header by reference where the rationale is uniform.
#
# CROSS-CUTTING JUSTIFICATIONS (per §6.J/§6.L anti-bluff + §6.AD.3 equivalence):
#
# A. `documented_promise: pass` for feature/* + core/* + Submodules/* rows:
#    The project's documented promises are recorded in:
#    - docs/ARCHITECTURE.md (system architecture, module layout)
#    - docs/CONTINUATION.md (operator-readable phase + state index)
#    - docs/sdk-developer-guide.md (per-tracker recipe)
#    - docs/LOCAL_NETWORK_DISCOVERY.md (mDNS flow)
#    - CHANGELOG.md (per-release distribution notes)
#    - per-module/per-submodule README.md + CLAUDE.md + AGENTS.md
#    These together constitute the "documented promise" §11.4.25 invariant 3.
#
# B. `no_open_bugs: pass` for feature/* + core/* + Submodules/* + app +
#    lava-api-go: Per §6.AD.3 equivalence to HelixConstitution §11.4.15
#    (Issues_Summary tracker), Lava's functionally-equivalent state lives in
#    three tracked artifacts:
#    - .lava-ci-evidence/crashlytics-resolved/<date>-<slug>.md (per §6.O)
#    - .lava-ci-evidence/sixth-law-incidents/<date>-<slug>.json (forensic)
#    - docs/issues/fixed/BUGFIXES.md (per §6.T.4 universal bug-fix log)
#    The §6.AD.3 mapping IS the closure-status-vocab compliance per
#    §11.4.33 + §11.4.34, binding via the §6.AD-equivalence amendment.
#    A row gets `no_open_bugs: pass` when there is no open bug attributed
#    to that module in any of the three tracked artifacts; open bugs would
#    appear as un-closed entries.
#
# C. `four_layer: pass` for feature/* + core/* + Submodules/* + app +
#    lava-api-go: The §1 four-layer test floor (pre-build + post-build +
#    runtime + paired mutation) is structurally satisfied per:
#    - Pre-build:  `scripts/check-constitution.sh` + `scripts/check-*-coverage.sh`
#                  + `scripts/scan-no-hardcoded-*.sh` + `scripts/check-challenge-discrimination.sh`
#                  + `scripts/check-coverage-ledger.sh` (this gate-set)
#    - Post-build: `./gradlew test` per-module unit tests + `make test` for lava-api-go
#                  + `tests/check-constitution/test_*.sh` hermetic gate fixtures
#    - Runtime:    Compose UI Challenge Tests under app/src/androidTest/.../challenges/
#                  + lava-api-go integration tests gated by `-Pintegration=true`
#                  + matrix-runner attestations under .lava-ci-evidence/<tag>/
#    - Paired mutation: Bluff-Audit stamps in commit bodies (per §6.N.2 + Seventh Law
#                       clause 5.b) + falsifiability rehearsals recorded per change.
#    Rows with `four_layer: pass` waiver cite the specific layer evidence
#    for that module; rows without sufficient evidence remain at `gap`.
#
# Schema:
#   waivers:
#     - path: <row-path-matching-ledger>
#       invariants:
#         <invariant-name>: "<override-value>"

