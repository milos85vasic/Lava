# GET /favorites — anonymous bookmarks list.
# Without an upstream cookie the bookmarks list is necessarily empty, so
# both backends MUST emit an empty JSON array (not null, not an empty
# object). This catches a class of bug where one backend silently emits
# `null` instead of `[]`.
name: get_favorites_anon
